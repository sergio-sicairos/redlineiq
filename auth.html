<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Pyline – Google Auth</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    body { margin:0; background:#0f0f0f; color:#ccc; font-family:sans-serif;
           display:flex; align-items:center; justify-content:center; height:100vh; }
    #msg { text-align:center; font-size:13px; line-height:1.6; }
    .spinner { width:20px; height:20px; border:2px solid rgba(255,255,255,0.1);
               border-top-color:#5b0eff; border-radius:50%; animation:spin 0.8s linear infinite;
               margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="msg"><div class="spinner"></div>Connecting to Google…</div>
  <script>
    Office.onReady(() => {
      // If Google redirected back with a token in the hash
      const hash = new URLSearchParams(location.hash.slice(1));
      const token     = hash.get("access_token");
      const expiresIn = hash.get("expires_in");
      const error     = hash.get("error");

      if (error) {
        document.getElementById("msg").textContent = "Auth failed: " + error;
        Office.context.ui.messageParent(JSON.stringify({ error }));
        return;
      }

      if (token) {
        const expiry = Date.now() + (parseInt(expiresIn || "3600") * 1000);
        document.getElementById("msg").textContent = "Connected ✓";
        Office.context.ui.messageParent(JSON.stringify({ token, expiry }));
        return;
      }

      // First load — redirect to Google OAuth (implicit / token flow)
      const params   = new URLSearchParams(location.search);
      const clientId = params.get("client_id");
      if (!clientId) {
        document.getElementById("msg").textContent = "Missing Google Client ID.";
        return;
      }

      const redirectUri = location.origin + location.pathname; // this page
      const authUrl = "https://accounts.google.com/o/oauth2/v2/auth?" + new URLSearchParams({
        client_id:     clientId,
        redirect_uri:  redirectUri,
        response_type: "token",
        scope:         "https://www.googleapis.com/auth/drive.file",
      });

      location.href = authUrl;
    });
  </script>
</body>
</html>
