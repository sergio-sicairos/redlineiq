<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RedlineIQ</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
      font-size: 13px; height: 100vh;
      display: flex; flex-direction: column;
    }
    #header {
      background: linear-gradient(135deg,#1e293b,#0f172a);
      border-bottom: 1px solid #1e293b;
      padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #header .logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; }
    #header .logo-icon {
      width:26px; height:26px; border-radius:6px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      display:flex; align-items:center; justify-content:center; font-size:13px;
    }
    #main { flex:1; overflow-y:auto; padding:14px; }
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 14px; border-radius:8px; border:none;
      font-size:12px; font-weight:600; cursor:pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; }
    .btn-secondary { background:#334155; color:#e2e8f0; border:1px solid #475569; }
    .btn-sm { padding:5px 10px; font-size:11px; }
    .btn-full { width:100%; justify-content:center; }
    .card {
      background:#1e293b; border-radius:10px;
      border:1px solid #334155; padding:14px; margin-bottom:10px;
    }
    .badge {
      display:inline-block; padding:2px 7px; border-radius:5px;
      font-size:10px; font-weight:600; white-space:nowrap;
    }
    .section-title {
      font-size:11px; font-weight:600; color:#6366f1;
      text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;
    }
    .clause-card {
      background:#0f172a; border-radius:8px; border:1px solid #334155;
      padding:12px; margin-bottom:8px;
      border-left: 3px solid #334155;
    }
    .clause-card.accept  { border-left-color:#22c55e; }
    .clause-card.negotiate { border-left-color:#f59e0b; }
    .clause-card.reject  { border-left-color:#ef4444; }
    .clause-card.flag    { border-left-color:#8b5cf6; }
    .decision-btns { display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
    .decision-btn {
      padding:4px 9px; border-radius:6px; font-size:11px; font-weight:600;
      cursor:pointer; border:2px solid #334155;
      background:transparent; color:#64748b;
    }
    .decision-btn.active-accept  { border-color:#22c55e; background:#22c55e22; color:#22c55e; }
    .decision-btn.active-negotiate { border-color:#f59e0b; background:#f59e0b22; color:#f59e0b; }
    .decision-btn.active-reject  { border-color:#ef4444; background:#ef444422; color:#ef4444; }
    .decision-btn.active-flag    { border-color:#8b5cf6; background:#8b5cf622; color:#8b5cf6; }
    .insert-btn {
      margin-top:6px; padding:4px 9px; border-radius:6px;
      font-size:11px; font-weight:600; cursor:pointer;
      border:1px solid #6366f144; background:#6366f111; color:#a78bfa;
      width:100%;
    }
    .insert-btn:hover { background:#6366f122; }
    .text-muted { color:#64748b; }
    .text-sm { font-size:12px; }
    .text-xs { font-size:11px; }
    label { font-size:11px; color:#94a3b8; display:block; margin-bottom:4px; }
    input, textarea {
      width:100%; padding:7px 10px; border-radius:7px;
      border:1px solid #475569; background:#0f172a; color:#e2e8f0;
      font-size:12px; margin-bottom:8px;
    }
    textarea { resize:vertical; }
    .progress-bar {
      height:5px; background:#334155; border-radius:3px; overflow:hidden; margin-bottom:12px;
    }
    .progress-fill {
      height:100%; background:linear-gradient(90deg,#6366f1,#22c55e);
      border-radius:3px; transition:width 0.3s;
    }
    .risk-badge-low    { background:#22c55e22; color:#22c55e; border:1px solid #22c55e44; }
    .risk-badge-medium { background:#f59e0b22; color:#f59e0b; border:1px solid #f59e0b44; }
    .risk-badge-high   { background:#ef444422; color:#ef4444; border:1px solid #ef444444; }
    .spinner {
      width:20px; height:20px; border:2px solid #334155;
      border-top-color:#6366f1; border-radius:50%;
      animation:spin 0.7s linear infinite; display:inline-block;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading-screen {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:12px; padding:20px;
    }
    #step-indicator {
      font-size:11px; color:#475569; text-align:center; padding:0 8px;
    }
    .summary-box {
      background:#0f172a; border-radius:8px; padding:12px;
      font-size:12px; color:#cbd5e1; line-height:1.6; margin-bottom:10px;
    }
    .critical-item {
      font-size:12px; color:#fca5a5; padding:5px 0;
      border-bottom:1px solid #334155;
    }
    .footer {
      padding:10px 14px; border-top:1px solid #1e293b;
      display:flex; gap:6px;
    }
    #sync-status {
      font-size:10px; padding:3px 8px; border-radius:20px;
      background:#22c55e22; color:#22c55e; border:1px solid #22c55e44;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-icon">📄</div>
    RedlineIQ
  </div>
  <span id="sync-status">● Drive</span>
</div>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div id="step-indicator">Initializing Office…</div>
</div>

<!-- Main content (hidden until ready) -->
<div id="main" style="display:none">

  <!-- Idle state -->
  <div id="view-idle">
    <div class="card" style="text-align:center; padding:20px;">
      <div style="font-size:24px;margin-bottom:8px;">⚡</div>
      <div style="font-weight:600;margin-bottom:4px;">Ready to Review</div>
      <div class="text-muted text-xs" style="margin-bottom:14px;">
        Reads the open Word document and reviews it against your shared playbook on Google Drive.
      </div>
      <button class="btn btn-primary btn-full" onclick="startReview()">
        Run AI Review
      </button>
    </div>
    <div class="card">
      <div class="section-title">Playbook Summary</div>
      <div id="playbook-summary" class="text-muted text-xs">Loading from Drive…</div>
    </div>
  </div>

  <!-- Reviewing state -->
  <div id="view-reviewing" style="display:none">
    <div class="card" style="text-align:center;padding:28px;">
      <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;"></div>
      <div style="font-weight:600;margin-bottom:6px;">Analyzing Document</div>
      <div id="review-step" class="text-muted text-xs">Reading document text…</div>
    </div>
  </div>

  <!-- Results state -->
  <div id="view-results" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-weight:600;font-size:14px;">Review Results</div>
      <button class="btn btn-secondary btn-sm" onclick="resetToIdle()">← New Review</button>
    </div>

    <!-- Summary -->
    <div class="card" id="result-summary-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="section-title" style="margin:0">Summary</div>
        <span id="risk-badge" class="badge"></span>
      </div>
      <div id="result-summary" class="summary-box"></div>
    </div>

    <!-- Critical issues -->
    <div class="card" id="critical-card" style="display:none;border-color:#ef444444;">
      <div class="section-title" style="color:#f87171">⚠ Critical Issues</div>
      <div id="critical-list"></div>
    </div>

    <!-- Progress -->
    <div id="progress-section">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span class="text-xs" style="color:#94a3b8;">Clause Decisions</span>
        <button class="btn btn-secondary btn-sm" onclick="acceptAll()">Accept All AI</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="progress-label" class="text-xs text-muted" style="margin-bottom:10px;"></div>
    </div>

    <!-- Clauses -->
    <div id="clauses-list"></div>

    <!-- Save button -->
    <div id="save-section" style="margin-top:10px;">
      <button class="btn btn-primary btn-full" onclick="saveOutcomes()" id="save-btn">
        💾 Save Outcomes to Drive
      </button>
    </div>
  </div>

</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const GDRIVE_MCP = "https://gdrive.mcp.claude.com/mcp";
const FOLDER = "RedlineIQ";
const MODEL = "claude-sonnet-4-20250514";

let playbook = { clauses: [], contracts: [], outcomes: [] };
let reviewClauses = [];
let docText = "";

// ── Boot ─────────────────────────────────────────────────────────────────────
Office.onReady(async (info) => {
  setStep("Loading playbook from Drive…");
  try {
    playbook = await loadFromDrive();
    renderPlaybookSummary();
    setStep("Ready");
    document.getElementById("sync-status").textContent = "● Drive";
  } catch(e) {
    setStep("Drive error: " + e.message.slice(0,60));
    document.getElementById("sync-status").style.color = "#ef4444";
    // Still show UI with defaults
    playbook = { clauses: getDefaults(), contracts: [], outcomes: [] };
    renderPlaybookSummary();
  }
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("main").style.display = "block";
  show("view-idle");
});

// ── Views ────────────────────────────────────────────────────────────────────
function show(id) {
  ["view-idle","view-reviewing","view-results"].forEach(v => {
    document.getElementById(v).style.display = v === id ? "block" : "none";
  });
}
function setStep(msg) {
  document.getElementById("step-indicator").textContent = msg;
  const el = document.getElementById("review-step");
  if (el) el.textContent = msg;
}
function resetToIdle() { show("view-idle"); }

// ── Playbook summary ─────────────────────────────────────────────────────────
function renderPlaybookSummary() {
  const cl = playbook.clauses || [];
  const el = document.getElementById("playbook-summary");
  if (!cl.length) { el.textContent = "No positions loaded."; return; }
  const grouped = {};
  cl.forEach(c => { if (!grouped[c.position]) grouped[c.position]=0; grouped[c.position]++; });
  el.innerHTML = `
    <div style="margin-bottom:6px;">${cl.length} positions loaded</div>
    ${Object.entries(grouped).map(([p,n]) => `
      <span class="badge" style="margin-right:4px;margin-bottom:4px;background:${p==='accept'?'#22c55e22':p==='negotiate'?'#f59e0b22':'#ef444422'};color:${p==='accept'?'#22c55e':p==='negotiate'?'#f59e0b':'#ef4444'};border:1px solid ${p==='accept'?'#22c55e44':p==='negotiate'?'#f59e0b44':'#ef444444'}">
        ${n} ${p}
      </span>`).join("")}
    <div style="margin-top:6px;color:#475569">${playbook.contracts?.filter(c=>c.docRole==='template').length||0} templates · ${playbook.contracts?.filter(c=>c.docRole==='negotiated').length||0} precedents</div>
  `;
}

// ── Review flow ───────────────────────────────────────────────────────────────
async function startReview() {
  show("view-reviewing");
  setStep("Reading document text…");

  try {
    // 1. Extract text from Word document
    docText = await getDocumentText();
    if (!docText.trim()) { alert("Document appears to be empty."); show("view-idle"); return; }

    setStep("Analyzing against playbook…");

    // 2. Build context
    const playbookCtx = (playbook.clauses||[]).map(c =>
      `[${c.category}] ${c.position}: ${(c.standardLang||"").slice(0,300)}${c.notes?` | ${c.notes}`:""}`
    ).join("\n");
    const tplCtx = (playbook.contracts||[]).filter(c=>c.docRole==="template")
      .map(c=>`[TEMPLATE] ${c.name}:\n${(c.text||"").slice(0,30000)}`).join("\n\n");

    const sys = `Senior contract review AI.
PLAYBOOK:\n${playbookCtx||"None"}
TEMPLATES:\n${tplCtx||"None"}

Only flag genuine material differences. Include exact sectionRef for every clause.
The "found" field MUST be EXACT verbatim text from the document (first 1-2 sentences).

Return JSON only:
{"overallRisk":"low|medium|high","summary":"2-3 sentences","clauses":[{"category":"","sectionRef":"","found":"EXACT verbatim","deviationFromTemplate":"","recommendation":"accept|negotiate|reject|flag","reasoning":"","suggestedLanguage":""}],"criticalIssues":[],"autoApprovable":true}`;

    const raw = await callClaude(sys, `Review this contract:\n\n${docText.slice(0, 40000)}`, 10000);
    const result = repairJSON(raw);

    setStep("Done.");
    renderResults(result);
    show("view-results");

  } catch(e) {
    alert("Review failed: " + e.message);
    show("view-idle");
  }
}

// ── Read Word document ────────────────────────────────────────────────────────
function getDocumentText() {
  return new Promise((resolve, reject) => {
    Word.run(async (context) => {
      const body = context.document.body;
      body.load("text");
      await context.sync();
      resolve(body.text);
    }).catch(reject);
  });
}

// ── Insert text into Word at cursor ─────────────────────────────────────────
function insertIntoDoc(text) {
  Word.run(async (context) => {
    const range = context.document.getSelection();
    range.insertText("\n\n[REDLINEIQ SUGGESTED LANGUAGE]\n" + text, "Replace");
    await context.sync();
  }).catch(e => alert("Insert failed: " + e.message));
}

// ── Render results ────────────────────────────────────────────────────────────
function renderResults(result) {
  reviewClauses = (result.clauses||[]).map(c => ({...c, userDecision: null, userNotes: ""}));

  // Risk badge
  const rC = {low:"#22c55e",medium:"#f59e0b",high:"#ef4444"};
  const riskBadge = document.getElementById("risk-badge");
  riskBadge.textContent = (result.overallRisk||"unknown").toUpperCase();
  riskBadge.className = "badge risk-badge-" + (result.overallRisk||"medium");

  // Summary
  document.getElementById("result-summary").textContent = result.summary || "Review complete.";

  // Critical issues
  if (result.criticalIssues?.length) {
    document.getElementById("critical-card").style.display = "block";
    document.getElementById("critical-list").innerHTML =
      result.criticalIssues.map(i=>`<div class="critical-item">${safeStr(i)}</div>`).join("");
  }

  renderClauses();
  updateProgress();
}

function renderClauses() {
  const container = document.getElementById("clauses-list");
  container.innerHTML = reviewClauses.map((c,i) => {
    const dec = c.userDecision || c.recommendation;
    const decColor = {accept:"#22c55e",negotiate:"#f59e0b",reject:"#ef4444",flag:"#8b5cf6"}[dec]||"#334155";
    return `
    <div class="clause-card ${dec}" id="clause-${i}">
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">
        <span class="badge" style="background:#6366f122;color:#a78bfa;border:1px solid #6366f144">${safeStr(c.category)}</span>
        ${c.sectionRef?`<span class="badge" style="background:#3b82f622;color:#60a5fa;border:1px solid #3b82f644">§ ${safeStr(c.sectionRef)}</span>`:""}
        <span class="badge" style="background:#47556922;color:#94a3b8;border:1px solid #47556944">AI: ${safeStr(c.recommendation)}</span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;"><strong style="color:#cbd5e1">Found:</strong> ${safeStr(c.found).slice(0,120)}…</div>
      ${c.deviationFromTemplate?`<div style="font-size:11px;color:#f59e0b;margin-bottom:4px;">⚠ ${safeStr(c.deviationFromTemplate).slice(0,100)}</div>`:""}
      <div style="font-size:11px;color:#cbd5e1;line-height:1.5;margin-bottom:6px;">${safeStr(c.reasoning).slice(0,150)}</div>
      ${c.suggestedLanguage?`
        <div style="font-size:11px;color:#a78bfa;background:#6366f111;padding:7px;border-radius:6px;margin-bottom:6px;line-height:1.4;">
          <strong>Suggested:</strong> ${safeStr(c.suggestedLanguage).slice(0,160)}
        </div>
        <button class="insert-btn" onclick="insertIntoDoc(${JSON.stringify(safeStr(c.suggestedLanguage)).replace(/'/g,"\\'")})" >
          ↩ Insert into doc at cursor
        </button>
      `:""}
      <div class="decision-btns">
        ${["accept","negotiate","reject","flag"].map(d=>`
          <button class="decision-btn ${dec===d?`active-${d}`:""}"
            onclick="setDecision(${i},'${d}')">${{accept:"✓ Accept",negotiate:"↔ Counter",reject:"✕ Reject",flag:"⚑ Flag"}[d]}</button>
        `).join("")}
      </div>
    </div>`;
  }).join("");
}

function setDecision(idx, decision) {
  reviewClauses[idx].userDecision = decision;
  renderClauses();
  updateProgress();
}

function acceptAll() {
  reviewClauses = reviewClauses.map(c => ({...c, userDecision: c.recommendation}));
  renderClauses();
  updateProgress();
}

function updateProgress() {
  const decided = reviewClauses.filter(c=>c.userDecision).length;
  const total = reviewClauses.length;
  const pct = total ? (decided/total*100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = `${decided}/${total} confirmed`;
}

// ── Save outcomes to Drive ────────────────────────────────────────────────────
async function saveOutcomes() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true; btn.textContent = "Saving to Drive…";
  const outcome = {
    id: Date.now().toString(),
    docName: (Office.context?.document?.url||"").split("/").pop() || "Word Document",
    loggedAt: new Date().toISOString(),
    clauses: reviewClauses.map(c => ({
      category: c.category, recommendation: c.recommendation,
      outcome: c.userDecision||c.recommendation, outcomeNotes: c.userNotes||""
    }))
  };
  try {
    const updated = [...(playbook.outcomes||[]), outcome];
    playbook.outcomes = updated;
    await writeDriveFile("outcomes.json", updated);
    btn.textContent = "✓ Saved to Drive";
    btn.style.background = "#16a34a";
  } catch(e) {
    btn.disabled = false;
    btn.textContent = "Save Outcomes to Drive";
    alert("Save failed: " + e.message);
  }
}

// ── Google Drive helpers ──────────────────────────────────────────────────────
async function loadFromDrive() {
  const [pb, co, ou] = await Promise.all([
    readDriveFile("playbook.json"),
    readDriveFile("contracts.json"),
    readDriveFile("outcomes.json"),
  ]);
  return {
    clauses: Array.isArray(pb) ? pb : getDefaults(),
    contracts: Array.isArray(co) ? co : [],
    outcomes: Array.isArray(ou) ? ou : [],
  };
}

async function readDriveFile(filename) {
  const result = await callClaudeWithMCP(
    `Find the file "${filename}" inside a folder called "${FOLDER}" in Google Drive. Read its full contents and return ONLY the parsed JSON array or object — no commentary, no markdown.`,
    GDRIVE_MCP
  );
  return repairJSON(result);
}

async function writeDriveFile(filename, data) {
  const content = JSON.stringify(data, null, 2);
  await callClaudeWithMCP(
    `Find or create a folder named "${FOLDER}" in Google Drive. Find or create a file named "${filename}" inside it. Update it with this exact content:\n\n${content}`,
    GDRIVE_MCP
  );
}

// ── Claude API calls ──────────────────────────────────────────────────────────
async function callClaude(system, user, maxTokens = 4096) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL, max_tokens: maxTokens,
      system, messages: [{ role:"user", content: user }]
    })
  });
  const d = await r.json();
  return (d.content||[]).map(b=>b.text||"").join("\n");
}

async function callClaudeWithMCP(prompt, mcpUrl) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL, max_tokens: 4096,
      system: "You are a file manager. Use the MCP tools to complete the task. Return ONLY raw JSON — no markdown, no commentary.",
      messages: [{ role:"user", content: prompt }],
      mcp_servers: [{ type:"url", url: mcpUrl, name:"gdrive" }]
    })
  });
  const d = await r.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function safeStr(v) {
  if (!v) return "";
  if (typeof v === "string") return v;
  return JSON.stringify(v);
}

function repairJSON(raw) {
  if (!raw) throw new Error("Empty response");
  let c = raw.replace(/```json|```/g,"").trim();
  try { return JSON.parse(c); } catch(_) {
    c = c.replace(/,\s*$/, "");
    const ob=(c.match(/\[/g)||[]).length-(c.match(/]/g)||[]).length;
    const oc=(c.match(/{/g)||[]).length-(c.match(/}/g)||[]).length;
    for(let i=0;i<ob;i++) c+="]";
    for(let i=0;i<oc;i++) c+="}";
    return JSON.parse(c);
  }
}

function getDefaults() {
  const now = new Date().toISOString();
  return [
    { id:"1", category:"Limitation of Liability", position:"negotiate", standardLang:"Each party's aggregate liability shall not exceed fees paid in the 12 months preceding the claim.", fallbackLang:"", notes:"", createdAt:now },
    { id:"2", category:"Indemnification", position:"accept", standardLang:"Each party shall indemnify the other from third-party claims arising from its own breach.", fallbackLang:"", notes:"", createdAt:now },
    { id:"3", category:"IP / Ownership", position:"reject", standardLang:"Customer shall not be restricted from independently developing similar solutions.", fallbackLang:"", notes:"HARD NO", createdAt:now },
  ];
}
</script>
</body>
</html>
